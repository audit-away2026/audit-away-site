<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Away</title>
    <style>
        .brand {
            padding: 20px;
        }
        .pull-quote {
            margin: 15px 0;
        }
        .sme-card {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 10px;
        }
        .closing-statement {
            color: #333;
        }
    </style>
</head>
<body>
    <header class="brand">
        <h1>Audit Away</h1>
    </header>
    <main>
        <section class="pull-quote">
            <blockquote>
                "Your financial clarity starts here!"
            </blockquote>
        </section>
        <section class="sme-card">
            <div class="card">Card 1</div>
            <div class="card">Card 2</div>
            <div class="card">Card 3</div>
        </section>
        <section class="closing-statement">
            <p>Thank you for choosing Audit Away. We look forward to assisting you!</p>
        </section>
    </main>
    <svg width="100" height="100">
        <circle cx="50" cy="50" r="40" stroke="black" stroke-width="3" fill="red" />
    </svg>
</body>
</html>
